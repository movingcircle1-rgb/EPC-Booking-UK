<svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g>
    <!-- Purple Background Rounded Rectangle -->
    <rect x="10" y="15" width="180" height="50" rx="8" fill="#7B3FF2"/>

    <!-- Moving Truck Icon -->
    <g transform="translate(20, 28)">
      <rect x="0" y="8" width="18" height="10" fill="white" rx="1"/>
      <rect x="18" y="5" width="12" height="13" fill="white" rx="1"/>
      <circle cx="8" cy="20" r="3" fill="white"/>
      <circle cx="22" cy="20" r="3" fill="white"/>
    </g>

    <!-- "compare my move" Text -->
    <text x="55" y="33" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white">compare</text>
    <text x="55" y="47" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white">my move</text>

    <!-- ".com" -->
    <text x="135" y="47" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#E0E0E0">.com</text>

    <!-- Check Mark -->
    <g transform="translate(165, 32)">
      <circle cx="0" cy="0" r="8" fill="white"/>
      <path d="M-3 0L-1 2L3 -2" stroke="#7B3FF2" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
