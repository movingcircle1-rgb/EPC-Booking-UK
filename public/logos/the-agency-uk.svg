<svg width="180" height="80" viewBox="0 0 180 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g>
    <!-- White Background -->
    <rect width="180" height="80" fill="#FFFFFF"/>

    <!-- Gold Border -->
    <rect x="2" y="2" width="176" height="76" fill="none" stroke="#B8860B" stroke-width="2"/>

    <!-- Building Icon -->
    <g transform="translate(25, 22)">
      <rect x="0" y="0" width="25" height="35" fill="none" stroke="#B8860B" stroke-width="1.5"/>
      <rect x="5" y="5" width="5" height="5" fill="#B8860B"/>
      <rect x="15" y="5" width="5" height="5" fill="#B8860B"/>
      <rect x="5" y="13" width="5" height="5" fill="#B8860B"/>
      <rect x="15" y="13" width="5" height="5" fill="#B8860B"/>
      <rect x="5" y="21" width="5" height="5" fill="#B8860B"/>
      <rect x="15" y="21" width="5" height="5" fill="#B8860B"/>
      <rect x="8" y="28" width="9" height="7" fill="#B8860B"/>
    </g>

    <!-- "THE AGENCY UK" Text -->
    <text x="65" y="36" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1A1A1A" letter-spacing="2">THE</text>
    <text x="65" y="52" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#B8860B" letter-spacing="1.5">AGENCY</text>
    <text x="65" y="66" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#666666" letter-spacing="1">UK</text>
  </g>
</svg>
